plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.poselandmarkerframeprocessor'
version = '0.7.9'

android {
  namespace "expo.modules.poselandmarkerframeprocessor"
  defaultConfig {
    versionCode 1
    versionName "0.7.9"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation project(':react-native-vision-camera')
}
